<!-- ============================================ -->
<!--               Trust Strip                    -->
<!-- ============================================ -->
<style>
  .trust-strip {
    background: #1a1a1a;
    color: #fff;
    padding: 1.25rem 1rem;
    border-top: 4px solid var(--primary);
  }
  .trust-strip-inner {
    max-width: 80rem;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem 1.5rem;
    text-align: center;
    font-family: "Poppins", Arial, sans-serif;
  }
  .trust-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .25rem;
    line-height: 1.2;
  }
  .trust-item strong {
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .trust-item span {
    font-size: .85rem;
    color: #d8d8d8;
  }
  .trust-item .stars { color: #ffc419; letter-spacing: 2px; }
  @media (min-width: 48rem) {
    .trust-strip-inner { grid-template-columns: repeat(4, 1fr); gap: 1rem 2rem; }
    .trust-item strong { font-size: 1.15rem; }
  }
</style>
<section class="trust-strip" aria-label="Trust indicators">
  <div class="trust-strip-inner">
    <div class="trust-item">
      <strong>10+ Years</strong>
      <span>Building St. Louis</span>
    </div>
    <div class="trust-item">
      <strong>Licensed &amp; Insured</strong>
      <span>Fully bonded GC</span>
    </div>
    <div class="trust-item">
      <strong><span class="stars">★★★★★</span></strong>
      <span>5.0 on Google</span>
    </div>
    <div class="trust-item">
      <strong>St. Louis Metro</strong>
      <span>MO &amp; Metro East IL</span>
    </div>
  </div>
</section>
