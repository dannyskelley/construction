
 <style>
     #map {
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #map .cs-title {color:white;}
  #map .cs-container {
    width: 100%;
    padding: var(--sectionPadding);
    max-width: 115rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(3rem, 5vw, 4rem);
    position: relative;
    z-index: 1;
  }
  #map .cs-content {
    text-align: center;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2;
  }
  #map .area-list { display: flex; flex-wrap: wrap; gap: .5rem; }
  #map .area-list h3 {
    color: white;
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    margin: 0 .5rem .5rem 0;
    font-size: 1rem;
    font-weight: 600;
  }
  @media only screen and (min-width: 44rem) {
    #map .cs-container {
      width: 480px;
      position: absolute;
      top: 30px;
      right: 0px;
      padding-top: 30px;
      padding-bottom: 30px;
    }
  }
 </style>

 <section id="map">
 <iframe
   src="{{client.address.mapLink}}"
   title="Map of {{client.name}} service area in St. Louis"
   width="100%"
   height="650"
   style="border:0;"
   allowfullscreen=""
   loading="lazy"
   referrerpolicy="no-referrer-when-downgrade"></iframe>

  <div class="cs-container" style="background-color: var(--primaryDark);">
    <div class="cs-content" style="text-align: left; display: block;">
      <div class="cs-title" style="text-align: left;">Areas we proudly serve</div>
      <div class="area-list">
        {% for area in client.serviceAreaList %}
        <h3>
          <img class="cs-icon" style="margin-right: 3px;" aria-hidden="true" loading="lazy" decoding="async"
               src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Icons%2Fpin-grey.svg" alt="" width="20" height="20">{{ area }}
        </h3>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
